# Sweetplace auto-generated — NON MODIFICARE MANUALMENTE
# Questa è la zona Home/Casa di default. Non spostare questa conf
# e non rinominare il nome Home perchè è usato da HA.
# Modificare le coords con quelle che si leggono dal sensore posizione
# della companion app del cliente quando in casa.
# Le coordinate qui sotto vengono sovrascritte automaticamente al primo
# onboarding tramite Sweetplace (Step 2: Indirizzo della casa).
zone:
  name: Home
  # Coordinate aggiornate automaticamente da Sweetplace Onboarding
  # Also in appdaem-gps.yaml
  latitude: 0.0000000
  longitude: 0.0000000
  radius: 10
  # modificare per fine-tuning della presenza con GPS e premere il pulsante
  # ZONE in strumenti per sviluppatori
  icon: mdi:home
